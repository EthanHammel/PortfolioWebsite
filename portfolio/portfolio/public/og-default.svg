<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <!-- Paper texture noise filter -->
    <filter id="noise" x="0%" y="0%" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="0.65" numOctaves="3" stitchTiles="stitch" result="noise"/>
      <feColorMatrix type="saturate" values="0" in="noise" result="grayNoise"/>
      <feBlend in="SourceGraphic" in2="grayNoise" mode="multiply" result="blended"/>
      <feComponentTransfer in="blended">
        <feFuncA type="linear" slope="1"/>
      </feComponentTransfer>
    </filter>

    <!-- Horizontal line pattern -->
    <pattern id="lines" x="0" y="0" width="1200" height="28" patternUnits="userSpaceOnUse">
      <line x1="0" y1="27" x2="1200" y2="27" stroke="#b8a78c" stroke-width="0.5" stroke-opacity="0.15"/>
    </pattern>
  </defs>

  <!-- Background paper -->
  <rect width="1200" height="630" fill="#f5f0e8"/>

  <!-- Writing lines -->
  <rect width="1200" height="630" fill="url(#lines)"/>

  <!-- Left accent bar — moss green -->
  <rect x="0" y="0" width="6" height="630" fill="#4a7c3f"/>

  <!-- Paper noise texture overlay -->
  <rect width="1200" height="630" fill="#3a2e1e" opacity="0.025" filter="url(#noise)"/>

  <!-- Top-left label -->
  <text
    x="52" y="72"
    font-family="'DM Mono', 'Courier New', monospace"
    font-size="13"
    fill="#9a8672"
    letter-spacing="0.05em"
  >portfolio</text>

  <!-- Main name — large Playfair-style serif treatment -->
  <text
    x="52" y="310"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="88"
    font-weight="700"
    fill="#3a2e1e"
    letter-spacing="-0.01em"
  >Your Name</text>

  <!-- Italic subtitle -->
  <text
    x="56" y="374"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="32"
    font-style="italic"
    fill="#6b5a42"
  >Designer · Developer · Creative</text>

  <!-- Bottom rule -->
  <line x1="52" y1="430" x2="560" y2="430" stroke="#cec3ae" stroke-width="1"/>

  <!-- Bottom tagline -->
  <text
    x="52" y="458"
    font-family="'DM Mono', 'Courier New', monospace"
    font-size="13"
    fill="#9a8672"
    letter-spacing="0.04em"
  >Resume · Art · Interactive projects</text>

  <!-- Paper airplane — top right decorative -->
  <g transform="translate(1050, 160) scale(2.2)">
    <polygon points="42,0 0,-16 10,0 0,16" fill="#4a7c3f" opacity="0.8"/>
    <line x1="42" y1="0" x2="10" y2="0" stroke="#2e5228" stroke-width="0.6" opacity="0.5"/>
    <!-- Trail dots -->
    <circle cx="-4"  cy="0" r="2.5" fill="#4a7c3f" opacity="0.35"/>
    <circle cx="-14" cy="0" r="1.8" fill="#4a7c3f" opacity="0.22"/>
    <circle cx="-22" cy="0" r="1.2" fill="#4a7c3f" opacity="0.12"/>
  </g>

  <!-- Bottom-right corner tag -->
  <text
    x="1148" y="600"
    font-family="'DM Mono', 'Courier New', monospace"
    font-size="11"
    fill="#b0a28a"
    text-anchor="end"
  >yoursite.com</text>
</svg>
